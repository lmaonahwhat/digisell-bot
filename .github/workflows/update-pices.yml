permissions:
  contents: write
name: Update Steam Prices

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run price updater
        run: node scripts/update-prices.js

      - name: Show result
        run: cat data/steam-data.json

      - name: Commit updated prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/steam-data.json
          git diff --cached --quiet || git commit -m "auto: update steam prices"
          git push
